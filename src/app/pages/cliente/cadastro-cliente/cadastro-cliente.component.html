<div class="container mt-4">
  <h2 class="mb-4 d-flex align-items-center">
    {{ editar? 'Editar Cliente' : 'Adicionar Cliente' }}
    <span class="ms-2" style="cursor: pointer;" title="Preencha os dados do cliente">
      <i class="bi bi-question-circle"></i>
    </span>
  </h2>

  <form [formGroup]="formGroup" (ngSubmit)="cadastrar()">

    <div class="mb-3">
      <label class="form-label">Nome</label>
      <input type="text" class="form-control" formControlName="nome">
    </div>

    <div class="mb-3">
      <label class="form-label">CPF</label>
      <input type="text" class="form-control" formControlName="cpf" mask="000.000.000-00">
    </div>

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" formControlName="email">
    </div>

    <div class="mb-3">
      <label class="form-label">Telefone</label>
      <input type="text" class="form-control" formControlName="telefone" mask="(00) 0 0000-0000">
    </div>

    <div formGroupName="endereco">
      <div class="row">
        <div class="col-md-4 mb-3">
          <label class="form-label">CEP</label>
          <input type="text" class="form-control" formControlName="cep" mask="00000-000" placeholder="58000-000">
        </div>

        <div class="col-md-8 mb-3">
          <label class="form-label">Logradouro</label>
          <input type="text" class="form-control" formControlName="logradouro">
        </div>
      </div>

      <div class="row">
        <div class="col-md-4 mb-3">
          <label class="form-label">Número</label>
          <input type="text" class="form-control" formControlName="numero">
        </div>

        <div class="col-md-8 mb-3">
          <label class="form-label">Complemento</label>
          <input type="text" class="form-control" formControlName="complemento">
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Bairro</label>
          <input type="text" class="form-control" formControlName="bairro">
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Cidade</label>
          <input type="text" class="form-control" formControlName="cidade">
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Estado</label>
          <input type="text" class="form-control" formControlName="estado">
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">País</label>
          <input type="text" class="form-control" formControlName="pais">
        </div>
      </div>
    </div>

    <div class="mt-4">
      <button type="submit" class="btn btn-success me-2" [disabled]="formGroup.invalid">
        {{ editar ? 'Salvar Alterações' : 'Cadastrar Cliente' }}
      </button>
      <button type="button" class="btn btn-secondary" (click)="cancelar()">
        Cancelar
      </button>
    </div>

  </form>
</div>

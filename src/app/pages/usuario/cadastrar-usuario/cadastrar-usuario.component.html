<div class="container d-flex justify-content-center align-items-center vh-100">

  <div class="card" style="min-width:320px; max-width:420px;">
    <div class="card-body">

      <h4 class="text-center mb-4">Criar conta</h4>

      <div *ngIf="successMessage" class="alert alert-success mb-3">
        {{ successMessage }}
      </div>

      <div *ngIf="error && !successMessage" class="alert alert-danger mb-3">
        {{ error }}
      </div>

      <form [formGroup]="registerForm" (ngSubmit)="handleSubmit()">

        <div class="mb-3">
          <label class="form-label">Usuário</label>
          <input
            type="text"
            class="form-control"
            placeholder="Digite um nome de usuário"
            formControlName="username"
          />
        </div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input
            type="email"
            class="form-control"
            placeholder="Digite seu e-mail"
            formControlName="email"
          />
        </div>

        <div class="mb-3">
          <label class="form-label">Senha</label>
          <input
            type="password"
            class="form-control"
            placeholder="Crie uma senha"
            formControlName="password"
          />
        </div>

        <div class="mb-3">
          <label class="form-label">Nível de acesso</label>

          <select class="form-select" formControlName="role">

            <option *ngFor="let role of roles" [value]="role">
              {{ role === 'ADMIN' ? 'Administrador' : 'Usuário Comum' }}
            </option>

          </select>

        </div>

        <div class="d-grid gap-2 mb-3">

          <button
            type="submit"
            class="btn btn-primary"
            [disabled]="submitting"
          >
            {{ submitting ? 'Cadastrando...' : 'Cadastrar' }}
          </button>

        </div>

        <div class="text-center">

          <button
            type="button"
            class="btn btn-link p-0"
            (click)="goToLogin()"
          >
            Já tem uma conta? Fazer login
          </button>

        </div>

      </form>

    </div>
  </div>

</div>
